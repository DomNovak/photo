name: Website bauen

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Dateien holen
        uses: actions/checkout@v4

      - name: Bilder einfügen und HTML bauen
        run: |
          python3 -c '
          import os, glob
          
          # Finde alle Bilder und ignoriere Groß-/Kleinschreibung der Endungen
          extensions = ["*.jpg", "*.jpeg", "*.png", "*.webp", "*.JPG", "*.JPEG", "*.PNG", "*.WEBP"]
          alle_bilder = []
          
          if os.path.exists("photos"):
              for ext in extensions:
                  alle_bilder.extend(glob.glob(f"photos/{ext}"))
          
          # Erstelle die HTML-Bilderliste (alphabetisch sortiert)
          bilder_html = ""
          for filepath in sorted(alle_bilder):
              bilder_html += f"<img src=\"{filepath}\" loading=\"lazy\">\n"

          # Öffne die Vorlage und setze die Bilder ein
          with open("template.html", "r", encoding="utf-8") as f:
              html = f.read()
          
          html = html.replace("", bilder_html)
          
          # Speichere die fertige Website
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)
          '

      - name: Bei GitHub Pages hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Website veröffentlichen
        uses: actions/deploy-pages@v4
